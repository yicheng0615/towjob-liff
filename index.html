<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拖車工單</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f6f8;
      color: #111;
    }

    .header {
      background: #0B7285;
      color: white;
      padding: 18px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h2 {
      margin: 0;
      font-size: 22px;
    }

    .summary {
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.95;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .tab {
      white-space: nowrap;
      border: none;
      padding: 8px 13px;
      border-radius: 20px;
      background: #e9ecef;
      font-size: 14px;
      font-weight: bold;
    }

    .tab.active {
      background: #0B7285;
      color: white;
    }

    .list {
      padding: 12px;
    }

    .group-card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .date-line {
      font-size: 14px;
      color: #666;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .route-line {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #111;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .route-arrow {
      color: #0B7285;
      font-weight: bold;
    }

    .group-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .status-pill {
      font-weight: bold;
      font-size: 13px;
      padding: 5px 9px;
      border-radius: 20px;
      background: #f1f3f5;
      white-space: nowrap;
    }

    .vehicle-list {
      border-top: 1px solid #eee;
      margin-top: 8px;
      padding-top: 6px;
    }

    .vehicle-row {
      padding: 10px 0;
      border-bottom: 1px solid #f1f1f1;
    }

    .vehicle-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .vehicle-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 10px;
    }

    .toggle {
      font-size: 14px;
      color: #0B7285;
      flex-shrink: 0;
    }

    .detail {
      display: none;
      margin-top: 10px;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: #333;
    }

    .detail.show {
      display: block;
    }

    .detail-row {
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .detail-label {
      color: #777;
      margin-right: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .btn-small {
      padding: 10px;
      font-size: 14px;
    }

    .btn-accept { background: #2E7D32; }
    .btn-reject { background: #C62828; }
    .btn-depart { background: #455A64; }
    .btn-arrive { background: #00695C; }

    .empty, .loading {
      text-align: center;
      color: #777;
      padding: 40px 10px;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="header">
    <h2>拖車工單</h2>
    <div class="summary" id="summary">讀取中...</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setFilter('', this)">全部</button>
    <button class="tab" onclick="setFilter('PENDING', this)">未接單</button>
    <button class="tab" onclick="setFilter('ACCEPTED', this)">已接單</button>
    <button class="tab" onclick="setFilter('REJECTED', this)">已拒絕</button>
    <button class="tab" onclick="setFilter('DEPARTED', this)">已出發</button>
    <button class="tab" onclick="setFilter('ARRIVED', this)">已完成</button>
  </div>

  <div class="list" id="list">
    <div class="loading">讀取工單中...</div>
  </div>

  <script>
    // 改成你的 ngrok 或正式 API
    const API_BASE = "https://unrationalised-aimee-girderless.ngrok-free.dev";

    let currentStatus = "";

    const statusOrder = {
      "PENDING": 1,
      "ACCEPTED": 2,
      "DEPARTED": 3,
      "REJECTED": 4,
      "ARRIVED": 5
    };

    async function loadOrders() {
      const list = document.getElementById("list");
      const summary = document.getElementById("summary");

      list.innerHTML = `<div class="loading">讀取工單中...</div>`;

      try {
        let url = `${API_BASE}/api/tow/orders`;
        if (currentStatus) {
          url += `?status=${encodeURIComponent(currentStatus)}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok && !data.Ok) {
          list.innerHTML = `<div class="empty">讀取失敗</div>`;
          summary.innerText = "讀取失敗";
          return;
        }

        const items = data.items || data.Items || [];
        summary.innerText = `目前共 ${items.length} 筆`;

        if (items.length === 0) {
          list.innerHTML = `<div class="empty">目前沒有工單</div>`;
          return;
        }

        const sorted = sortItems(items);
        const groups = groupOrders(sorted);

        list.innerHTML = groups.map(renderGroup).join("");

      } catch (err) {
        console.error(err);
        list.innerHTML = `<div class="empty">API 連線失敗</div>`;
        summary.innerText = "API 連線失敗";
      }
    }

    function sortItems(items) {
      return items.sort((a, b) => {
        const da = normalizeDate(a.ScheduleTime || a.scheduleTime || a.排定時間 || "");
        const db = normalizeDate(b.ScheduleTime || b.scheduleTime || b.排定時間 || "");

        if (da !== db) return da.localeCompare(db);

        const sa = statusOrder[a.UiStatus] || 99;
        const sb = statusOrder[b.UiStatus] || 99;
        if (sa !== sb) return sa - sb;

        const ra = `${a.From || ""}-${a.To || ""}`;
        const rb = `${b.From || ""}-${b.To || ""}`;
        if (ra !== rb) return ra.localeCompare(rb);

        return (a.VinDisplay || "").localeCompare(b.VinDisplay || "");
      });
    }

    function groupOrders(items) {
      const map = {};

      items.forEach(o => {
        const schedule = getSchedule(o);
        const from = o.From || "";
        const to = o.To || "";
        const status = o.UiStatus || "PENDING";

        const key = `${schedule}__${from}__${to}__${status}`;

        if (!map[key]) {
          map[key] = {
            schedule,
            from,
            to,
            status,
            statusText: o.UiStatusText,
            statusIcon: o.UiStatusIcon,
            allowedActions: o.AllowedActions || [],
            items: []
          };
        }

        map[key].items.push(o);
      });

      return Object.values(map);
    }

    function renderGroup(g) {
      const groupActions = renderGroupActions(g);

      return `
        <div class="group-card">
          <div class="date-line">預定抵達日期：${escapeHtml(formatExcelDate(g.schedule))}</div>

          <div class="route-line">
            <span>${escapeHtml(g.from || "-")}</span>
            <span class="route-arrow">→</span>
            <span>${escapeHtml(g.to || "-")}</span>
          </div>

          <div class="group-meta">
            <div>共 ${g.items.length} 台</div>
            <div class="status-pill">${g.statusIcon || ""} ${escapeHtml(g.statusText || "")}</div>
          </div>

          <div class="vehicle-list">
            ${g.items.map(renderVehicle).join("")}
          </div>

          ${groupActions}
        </div>
      `;
    }

    function renderVehicle(o) {
      const orderNo = o.OrderNo || "";
      const detailId = `detail_${orderNo}`;
      const singleActions = renderSingleActions(o);

      return `
        <div class="vehicle-row">
          <div class="vehicle-head" onclick="toggleDetail('${detailId}', this)">
            <div class="vehicle-title">
              ${escapeHtml(o.VinDisplay || o.Vin || "")}｜${escapeHtml(o.Model || "-")}
            </div>
            <div class="toggle">▼</div>
          </div>

          <div class="detail" id="${detailId}">
            <div class="detail-row"><span class="detail-label">拖車單號：</span>${escapeHtml(orderNo)}</div>
            <div class="detail-row"><span class="detail-label">VIN：</span>${escapeHtml(o.Vin || "")}</div>
            <div class="detail-row"><span class="detail-label">車輛類型：</span>${escapeHtml(o.VehicleType || "")}</div>
            <div class="detail-row"><span class="detail-label">車型：</span>${escapeHtml(o.Model || "")}</div>
            <div class="detail-row"><span class="detail-label">拖車類型：</span>${escapeHtml(o.TowType || "")}</div>
            <div class="detail-row"><span class="detail-label">預定抵達日期：</span>${escapeHtml(formatExcelDate(o.ScheduleTime))}</div>
            <div class="detail-row"><span class="detail-label">MMT派工人員：</span>${escapeHtml(o.AssignUser || "")}</div>
            <div class="detail-row"><span class="detail-label">備註：</span>${escapeHtml(o.Remark || "無")}</div>
            <div class="detail-row"><span class="detail-label">目前狀態：</span>${o.UiStatusIcon || ""} ${escapeHtml(o.UiStatusText || "")}</div>

            ${singleActions}
          </div>
        </div>
      `;
    }

    function renderGroupActions(g) {
      if (!g.allowedActions || g.allowedActions.length === 0) return "";

      const buttons = g.allowedActions.map(action => {
        return `
          <button class="btn ${getActionClass(action)}" onclick="doGroupAction('${action}', '${getOrderNos(g.items)}')">
            全部${getActionText(action)}
          </button>
        `;
      }).join("");

      return `<div class="actions">${buttons}</div>`;
    }

    function renderSingleActions(o) {
      const actions = o.AllowedActions || [];
      if (actions.length === 0) return "";

      const buttons = actions.map(action => {
        return `
          <button class="btn btn-small ${getActionClass(action)}" onclick="event.stopPropagation(); doAction('${o.OrderNo}', '${action}')">
            單台${getActionText(action)}
          </button>
        `;
      }).join("");

      return `<div class="detail-actions">${buttons}</div>`;
    }

    function getOrderNos(items) {
      return items.map(x => x.OrderNo).join(",");
    }

    async function doGroupAction(action, orderNosText) {
      const orderNos = orderNosText.split(",").filter(x => x);
      const actionText = getActionText(action);

      if (!confirm(`確認要「全部${actionText}」嗎？共 ${orderNos.length} 台`)) {
        return;
      }

      for (const orderNo of orderNos) {
        await callActionApi(orderNo, action);
      }

      alert(`全部${actionText}完成`);
      await loadOrders();
    }

    async function doAction(orderNo, action) {
      const actionText = getActionText(action);

      if (!confirm(`確認要「${actionText}」嗎？`)) {
        return;
      }

      await callActionApi(orderNo, action);
      alert(`${actionText}成功`);
      await loadOrders();
    }

    async function callActionApi(orderNo, action) {
      const res = await fetch(`${API_BASE}/api/tow/${action}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          OrderNo: orderNo
        })
      });

      const result = await res.json();

      if (!res.ok || !(result.Ok || result.ok)) {
        throw new Error(result.Message || result.message || "操作失敗");
      }

      return result;
    }

    function toggleDetail(id, el) {
      const detail = document.getElementById(id);
      const toggle = el.querySelector(".toggle");

      if (!detail) return;

      const isShow = detail.classList.contains("show");
      detail.classList.toggle("show", !isShow);
      toggle.innerText = isShow ? "▼" : "▲";
    }

    function setFilter(status, btn) {
      currentStatus = status;

      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      btn.classList.add("active");

      loadOrders();
    }

    function getSchedule(o) {
      return (
        o.ScheduleTime ||
        o.scheduleTime ||
        o.排定時間 ||
        o.Schedule ||
        o.schedule ||
        "未排定"
      );
    }

    function normalizeDate(value) {
      if (!value) return "9999/99/99";
      return String(value).replaceAll("-", "/").substring(0, 10);
    }

    function getActionText(action) {
      switch (action) {
        case "accept": return "接單";
        case "reject": return "拒絕";
        case "depart": return "出發";
        case "arrive": return "抵達";
        default: return action;
      }
    }

    function getActionClass(action) {
      switch (action) {
        case "accept": return "btn-accept";
        case "reject": return "btn-reject";
        case "depart": return "btn-depart";
        case "arrive": return "btn-arrive";
        default: return "";
      }
    }

    function formatExcelDate(value) {
      if (!value) return "未排定";
    
      const str = String(value).trim();
    
      // Excel 日期序號，例如 46141
      if (/^\d+$/.test(str)) {
        const serial = parseInt(str, 10);
        const excelEpoch = new Date(Date.UTC(1899, 11, 30));
        const date = new Date(excelEpoch.getTime() + serial * 86400000);
    
        const y = date.getUTCFullYear();
        const m = String(date.getUTCMonth() + 1).padStart(2, "0");
        const d = String(date.getUTCDate()).padStart(2, "0");
    
        return `${y}/${m}/${d}`;
      }
    
      return str.substring(0, 10).replaceAll("-", "/");
    }
    function escapeHtml(value) {
      if (value === null || value === undefined) return "";

      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadOrders();
  </script>
</body>
</html>
